<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        const currentParams = window.location.search;
        
        const targetUrl = window.location.origin + "/account/verify-email" + currentParams;
        
        window.location.replace(targetUrl);
    </script>
</head>
<body>
    <p>If you are not automatically redirected, <a id="fallback" href="/account/verify-email">click here</a>.</p>
    <script>
        document.getElementById('fallback').href = "/account/verify-email" + currentParams;
    </script>
</body>
</html>
